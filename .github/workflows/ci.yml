name: CI-Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-binary:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: build binary
      run: |
        docker build . -t builder
        docker run --rm -v ${PWD}:/project builder /bin/bash -c "make -f Makefile.boot1 && make && make -f Makefile.fastboot && make -f Makefile.isfshax && cat boot1.img fw.img > sdcard.img"
        
    - uses: actions/upload-artifact@v4
      with:
       name: minute-artifacts
       path: |
         *.img
         *.elf
         *.map

  deploy-binary:
    needs: build-binary
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-22.04
    steps:   
    - name: Get environment variables
      id: get_repository_name
      run: |
        echo "REPOSITORY_NAME=$(echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}' | sed -e "s/:refs//")" >> $GITHUB_ENV
        echo "DATETIME=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_ENV 
    
    - uses: actions/download-artifact@v4
      with:
        name: minute-artifacts
        path: artifacts

    - name: zip artifact
      run: |
        cd artifacts
        zip -r ../${{ env.REPOSITORY_NAME }}_${{ env.DATETIME }}.zip ./*
    
    - name: Create Release
      uses: "softprops/action-gh-release@v2"
      with:
        tag_name: ${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
        draft: false
        prerelease: true
        generate_release_notes: true
        name: Nightly-${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
        files: |
          ./${{ env.REPOSITORY_NAME }}_${{ env.DATETIME }}.zip
