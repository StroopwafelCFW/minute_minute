name: CI-Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-binary:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        load: true
        tags: builder:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: build binary
      run: |
        docker run --rm -v ${PWD}:/project builder:latest /bin/bash -c "make -f Makefile.boot1 clean && make clean && make -f Makefile.fastboot clean && make -f Makefile.isfshax clean && make -f Makefile.boot1 && make && make -f Makefile.fastboot && make -f Makefile.isfshax && cat boot1.img fw.img > sdcard.img"
        
    - uses: actions/upload-artifact@v4
      with:
       name: minute-artifacts
       path: |
         *.img
         *.elf
         *.map

  deploy-binary:
    needs: build-binary
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-22.04
    steps:   
    - name: Get environment variables
      id: get_repository_name
      run: |
        echo "REPOSITORY_NAME=$(echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}' | sed -e "s/:refs//")" >> $GITHUB_ENV
        echo "DATETIME=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_ENV 
    
    - uses: actions/download-artifact@v4
      with:
        name: minute-artifacts
        path: artifacts

    - name: Create Release
      uses: "softprops/action-gh-release@v2"
      with:
        tag_name: ${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
        draft: true
        prerelease: true
        generate_release_notes: true
        name: Nightly-${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
        files: |
          artifacts/boot1.img
          artifacts/fw.img
          artifacts/fw_fastboot.img
